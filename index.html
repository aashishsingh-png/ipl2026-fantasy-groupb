<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>DST Leaderboard</title>
<style>
  :root{
    --bg:#f0f2f5;--bg2:#ffffff;--bg3:#f7f8fa;--text:#1a1d27;--muted:#6b7280;
    --border:#e5e7eb;--gold:#d97706;--silver:#6b7280;--bronze:#92400e;
    --accent:#2563eb;--accent-bg:#eff6ff;--accent-border:#bfdbfe;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;}

  /* HEADER */
  .header{background:var(--bg2);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;box-shadow:0 1px 4px #0000000a;}
  .back-btn{background:none;border:1px solid var(--border);color:var(--muted);padding:6px 12px;border-radius:8px;cursor:pointer;font-size:13px;display:none;transition:background .15s;}
  .back-btn:hover{background:var(--bg3);}
  .back-btn.show{display:block;}
  .header-title{flex:1;}
  .header-title h1{font-size:17px;font-weight:700;color:var(--text);}
  .header-title p{font-size:11px;color:var(--muted);margin-top:1px;}
  .updated-badge{font-size:10px;padding:3px 9px;border-radius:20px;background:var(--accent-bg);color:var(--accent);border:1px solid var(--accent-border);white-space:nowrap;}

  /* LOADING */
  .loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;gap:12px;color:var(--muted);}
  .spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}

  /* PODIUM */
  .podium{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;padding:18px 16px 10px;}
  .pod{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:14px 10px;text-align:center;cursor:pointer;transition:transform .15s,box-shadow .15s;box-shadow:0 1px 3px #0000000a;}
  .pod:hover{transform:translateY(-3px);box-shadow:0 4px 12px #00000014;}
  .pod.r1{border-color:#fbbf24;background:#fffbeb;}
  .pod.r2{border-color:#d1d5db;background:#f9fafb;}
  .pod.r3{border-color:#d97706;background:#fffbeb;}
  .pod-medal{font-size:24px;margin-bottom:5px;}
  .pod-name{font-size:11px;font-weight:600;margin-bottom:3px;line-height:1.3;}
  .pod-pts{font-size:21px;font-weight:700;}
  .pod-sub{font-size:10px;color:var(--muted);margin-top:2px;}

  /* HOME LIST */
  .section{padding:4px 16px 20px;}
  .sec-title{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;font-weight:600;margin-bottom:10px;}
  .sq-row{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:13px 15px;margin-bottom:9px;cursor:pointer;transition:border-color .15s,box-shadow .15s;display:flex;align-items:center;gap:11px;box-shadow:0 1px 3px #0000000a;}
  .sq-row:hover{box-shadow:0 4px 12px #00000014;border-color:#d1d5db;}
  .sq-rank{width:27px;height:27px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0;}
  .sq-info{flex:1;min-width:0;}
  .sq-name{font-size:14px;font-weight:600;}
  .sq-tags{display:flex;gap:5px;margin-top:4px;flex-wrap:wrap;}
  .tag{font-size:10px;padding:2px 7px;border-radius:20px;border:1px solid;}
  .sq-bar-wrap{width:100%;background:var(--border);border-radius:3px;height:3px;margin-top:7px;overflow:hidden;}
  .sq-bar{height:100%;border-radius:3px;}
  .sq-summary{margin-top:6px;display:flex;gap:14px;align-items:center;}
  .sq-summary-item{font-size:11px;}
  .sq-summary-item .label{color:var(--muted);}
  .sq-summary-item .value{color:var(--text);font-weight:600;margin-left:3px;}
  .sq-pts{text-align:right;flex-shrink:0;}
  .sq-pts-val{font-size:21px;font-weight:700;}
  .sq-pts-lbl{font-size:10px;color:var(--muted);}

  /* DETAIL VIEW */
  #vDetail{display:none;}
  .d-hero{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:18px;margin:16px 16px 14px;box-shadow:0 1px 3px #0000000a;}
  .d-hero-top{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
  .d-avatar{width:50px;height:50px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:700;flex-shrink:0;}
  .d-squad-name{font-size:19px;font-weight:700;}
  .d-owner{font-size:12px;color:var(--muted);margin-top:2px;}
  .d-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
  .stat{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:11px;text-align:center;}
  .stat-v{font-size:19px;font-weight:700;}
  .stat-l{font-size:10px;color:var(--muted);margin-top:2px;}

  /* TABS - Updated for scrollability */
  .tabs{display:flex;border-bottom:1px solid var(--border);padding:0 16px;overflow-x:auto;background:var(--bg2);-webkit-overflow-scrolling:touch;scrollbar-width:none;}
  .tabs::-webkit-scrollbar{display:none;}
  .tb{background:none;border:none;color:var(--muted);padding:9px 13px;font-size:12px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;transition:color .15s;flex-shrink:0;}
  .tb.act{color:var(--accent);border-bottom-color:var(--accent);font-weight:600;}
  .tb:hover:not(.act){color:var(--text);}

  /* COMPACT TABLE - for Overall view with many matches */
  .compact-table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;margin-top:8px;position:relative;}
  .compact-table{width:100%;border-collapse:collapse;font-size:12px;}
  .compact-table th{font-size:9px;color:var(--text);text-align:left;padding:8px 6px;border-bottom:2px solid var(--border);font-weight:700;background:linear-gradient(to bottom,#f9fafb,#f3f4f6);white-space:nowrap;position:sticky;left:0;z-index:1;text-transform:uppercase;letter-spacing:0.03em;}
  .compact-table th.player-col{min-width:140px;max-width:140px;position:sticky;left:0;background:linear-gradient(to bottom,#f9fafb,#f3f4f6);z-index:2;}
  .compact-table th.match-col{text-align:center;min-width:40px;}
  .compact-table th.total-col{text-align:right;position:sticky;right:0;background:linear-gradient(to bottom,#f9fafb,#f3f4f6);z-index:2;min-width:50px;}
  .compact-table td{padding:6px;border-bottom:1px solid var(--border);background:var(--bg2);vertical-align:middle;}
  .compact-table td.player-col{position:sticky;left:0;background:var(--bg2);z-index:1;min-width:140px;max-width:140px;}
  .compact-table td.total-col{position:sticky;right:0;background:var(--bg2);z-index:1;text-align:right;font-weight:600;min-width:50px;}
  .compact-table tr:hover td{background:var(--bg3);}
  .compact-table tr:hover td.player-col,.compact-table tr:hover td.total-col{background:var(--bg3);}
  .compact-table td.match-col{text-align:center;font-size:11px;}

  /* PLAYER TABLE */
  .ptable{width:100%;border-collapse:collapse;}
  .ptable th{font-size:10px;color:var(--muted);text-align:left;padding:6px 10px;border-bottom:1px solid var(--border);font-weight:600;background:var(--bg3);}
  .ptable th.r{text-align:right;}
  .ptable td{padding:9px 10px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle;background:var(--bg2);}
  .ptable tr:last-child td{border-bottom:none;}
  .ptable tr:hover td{background:var(--bg3);}
  .pname{display:flex;align-items:center;gap:6px;}
  .rtag{font-size:9px;padding:1px 5px;border-radius:8px;font-weight:600;}
  .rc{background:#fef3c7;color:#d97706;border:1px solid #fcd34d;}
  .rvc{background:#f3f4f6;color:#6b7280;border:1px solid #d1d5db;}
  .ris{background:#dcfce7;color:#16a34a;border:1px solid #86efac;}
  .tr{text-align:right;}
  .c-pos{color:#16a34a;font-weight:600;}
  .c-neg{color:#dc2626;font-weight:600;}
  .c-muted{color:var(--muted);font-size:12px;}

  /* CLICKABLE PTS CELL */
  .pts-clickable{cursor:pointer;text-decoration:underline dotted;text-underline-offset:2px;}
  .pts-clickable:hover{opacity:0.75;}

  /* COMPARISON SECTION */
  .compare-section{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:16px;margin:16px;box-shadow:0 1px 3px #0000000a;}
  .compare-title{font-size:13px;font-weight:600;margin-bottom:12px;color:var(--text);}
  .compare-selectors{display:grid;grid-template-columns:1fr auto 1fr;gap:10px;align-items:center;margin-bottom:12px;}
  .compare-select{padding:8px 12px;border:1px solid var(--border);border-radius:8px;background:var(--bg3);font-size:13px;color:var(--text);width:100%;}
  .compare-vs{font-size:12px;color:var(--muted);font-weight:600;}
  .compare-btn{width:100%;padding:10px;background:var(--accent);color:white;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:background .15s;}
  .compare-btn:hover{background:#1e40af;}
  .compare-btn:disabled{background:var(--border);cursor:not-allowed;}
  .compare-result{margin-top:12px;padding-top:12px;border-top:1px solid var(--border);}
  .compare-teams{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
  .compare-team{text-align:center;padding:10px;background:var(--bg3);border-radius:8px;}
  .compare-team-name{font-size:11px;color:var(--muted);margin-bottom:4px;}
  .compare-team-pts{font-size:24px;font-weight:700;}
  .compare-battlefield{display:grid;grid-template-columns:1fr 1fr;gap:2px;margin-top:12px;background:var(--border);border-radius:10px;overflow:hidden;}
  .compare-side{background:var(--bg2);padding:8px;}
  .compare-side-header{font-size:11px;font-weight:700;padding:8px;text-align:center;text-transform:uppercase;letter-spacing:0.05em;position:sticky;top:0;z-index:1;}
  .compare-player-row{display:flex;justify-content:space-between;align-items:center;padding:6px 8px;font-size:12px;border-bottom:1px solid var(--border);}
  .compare-player-row:last-child{border-bottom:none;}
  .compare-player-name{font-weight:500;}
  .compare-player-pts{font-weight:700;}
  .compare-total-row{display:flex;justify-content:space-between;padding:10px 8px;font-size:13px;font-weight:700;background:var(--bg3);margin-top:4px;border-radius:6px;}

  /* SCROLL INDICATOR */
  .scroll-indicator{position:absolute;right:16px;top:50%;transform:translateY(-50%);background:var(--accent);color:white;padding:6px 10px;border-radius:20px;font-size:11px;font-weight:600;pointer-events:none;animation:pulse 2s infinite;box-shadow:0 2px 8px #2563eb44;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.6;}}
  .table-wrapper{position:relative;}
  .scroll-indicator.hidden{display:none;}

  /* COLLAPSIBLE SECTIONS */
  .matches-section{margin-top:12px;}
  .section-header{display:flex;align-items:center;justify-content:space-between;padding:10px 0;cursor:pointer;user-select:none;}
  .section-header:hover .section-title{color:var(--accent);}
  .section-title{font-size:12px;font-weight:600;color:var(--text);}
  .section-toggle{font-size:11px;color:var(--accent);display:flex;align-items:center;gap:4px;}
  .section-content{display:none;overflow:hidden;}
  .section-content.expanded{display:block;}

  /* MATCH SUMMARY BAR */
  .m-summary{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:13px 15px;margin:14px 16px 12px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 1px 3px #0000000a;}
  .m-summary-info{font-size:12px;color:var(--muted);}
  .m-summary-pts{font-size:26px;font-weight:700;}

  /* MODAL */
  .modal-overlay{position:fixed;inset:0;background:#0000006e;z-index:500;display:flex;align-items:flex-end;justify-content:center;}
  .modal{background:var(--bg2);border-radius:20px 20px 0 0;width:100%;max-width:520px;max-height:88vh;overflow-y:auto;padding:20px 20px 36px;}
  .modal-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px;}
  .modal-title{font-size:16px;font-weight:700;margin-bottom:2px;}
  .modal-sub{font-size:12px;color:var(--muted);margin-bottom:16px;}
  .sc-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;}
  .sc-card{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px 12px;}
  .sc-card-label{font-size:10px;color:var(--muted);margin-bottom:3px;text-transform:uppercase;letter-spacing:.04em;font-weight:600;}
  .sc-card-val{font-size:18px;font-weight:700;}
  .pts-breakdown{border:1px solid var(--border);border-radius:10px;overflow:hidden;}
  .pts-row{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;border-bottom:1px solid var(--border);font-size:12px;}
  .pts-row:last-child{border-bottom:none;}
  .pts-row.total{font-weight:700;font-size:13px;background:var(--bg3);}
  .pts-row-label{color:var(--muted);}
  .pts-row-val{font-weight:600;}
  .pts-row-val.pos{color:#16a34a;}
  .pts-row-val.neg{color:#dc2626;}
  .pts-row-val.neu{color:var(--text);}
  .modal-close{width:100%;margin-top:14px;padding:11px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;color:var(--text);transition:background .15s;}
  .modal-close:hover{background:var(--border);}

  @media(max-width:480px){
    .podium{gap:7px;padding:14px 12px 8px;}
    .pod-pts{font-size:18px;}
    .pod-name{font-size:10px;}
  }
</style>
</head>
<body>

<div class="header">
  <button class="back-btn" id="backBtn" onclick="goHome()">← Back</button>
  <div class="header-title">
    <h1 id="hTitle">DST Leaderboard</h1>
    <p id="hSub">Private League · 8 Teams · Dream11 T20 Rules</p>
  </div>
  <span class="updated-badge" id="updBadge">Loading…</span>
</div>

<div id="vHome">
  <div class="loading" id="loadingEl">
    <div class="spinner"></div>
    <div>Fetching latest scores from Google Sheets…</div>
  </div>
  <div id="homeContent" style="display:none">
    <div class="podium" id="podium"></div>
    
    <!-- COMPARISON SECTION -->
    <div class="compare-section">
      <div class="compare-title">🔍 Compare Squads</div>
      <div class="compare-selectors">
        <select class="compare-select" id="compareTeam1">
          <option value="">Select Squad 1</option>

        <span class="compare-vs">VS</span>
        <select class="compare-select" id="compareTeam2">

      </div>

      <div id="comparisonResult" style="display:none"></div>

    <div class="section">
      <div class="sec-title">All Squads — tap to explore</div>
      <div id="sqList"></div>
    </div>
  </div>
</div>

<div id="vDetail">
  <div class="d-hero" id="dHero"></div>
  <div class="tabs" id="dTabs"></div>
  <div id="dBody" style="padding:0 16px 40px"></div>
</div>

<!-- PLAYER SCORECARD MODAL -->
<div class="modal-overlay" id="modalOverlay" style="display:none" onclick="closeModal(event)">
  <div class="modal" id="modalBox">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modalTitle"></div>
    <div class="modal-sub" id="modalSub"></div>
    <div class="sc-grid" id="modalStats"></div>
    <div class="pts-breakdown" id="modalBreakdown"></div>
    <button class="modal-close" onclick="closeModalBtn()">Close</button>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════════════════════════════
// GOOGLE SHEETS CONFIGURATION
// ══════════════════════════════════════════════════════════════════════════════
const SHEET_ID = '1BQyrCNM7d9wEw5LNKIwm8ZXfNN3JhPR3rrUOlq3I8zs';
const SHEET_GID = '0';

// ── SQUADS ────────────────────────────────────────────────────────────────────
const SQUADS = {
  "T1 Nishant & Mainak": {

    players:["Mohammed Siraj","Quinton de Kock","Marco Jansen","Varun Chakaravarthy","Kuldeep Yadav","Sunil Narine","Hardik Pandya","Finn Allen","Prasidh Krishna","Priyansh Arya","Vaibhav Arora"]
  },
  "T2 Smatish & Swapnesh": {

    players:["Bhuvneshwar Kumar","Ishan Kishan","Rohit Sharma","Jofra Archer","Jasprit Bumrah","Shivam Dube","Ajinkya Rahane","Axar Patel","Jacob Bethell","Will Jacks","Ashwani Kumar"]

    players:["Shubman Gill","Abhishek Sharma","Yashasvi Jaiswal","Mohammed Shami","Avesh Khan","Nitish Kumar Reddy","Angkrish Raghuvanshi","Harshal Patel","Pathum Nissanka","Azmatullah Omarzai","T Natarajan"]

    players:["Rinku Singh","KL Rahul","Aiden Markram","Rishabh Pant","Ruturaj Gaikwad","Dewald Brevis","Tim David","Dhruv Jurel","Prabhsimran Singh","Jason Holder","Harsh Dubey"]
  },

    color:"#9333ea", C:"Virat Kohli", VC:"Sai Sudharsan", owner:"Rahul & Sahil M",
    players:["Riyan Parag","Ravindra Jadeja","Sai Sudharsan","Virat Kohli","Josh Hazlewood","Suryakumar Yadav","Marcus Stoinis","Mukesh Kumar","Digvesh Singh Rathi","Karun Nair","Khaleel Ahmed"]
  },
  "T6 Sanidhya & Aashish & Sahil Tagra": {
    color:"#0891b2", C:"Cameron Green", VC:"Sanju Samson", owner:"Sanidhya & Aashish & Sahil Tagra",
    players:["Heinrich Klaasen","Rajat Patidar","Sanju Samson","Cameron Green","Kagiso Rabada","Tristan Stubbs","Krunal Pandya","Ryan Rickelton","Ayush Mhatre","Romario Shepherd","Washington Sundar"]
  },
  "T7 Ishaan & Mohit & Harshank": {
    color:"#d97706", C:"Shreyas Iyer", VC:"Mitchell Marsh", owner:"Ishaan & Mohit & Harshank",
    players:["Mitchell Marsh","Nicholas Pooran","Shreyas Iyer","Philip Salt","Yuzvendra Chahal","Ravi Bishnoi","Noor Ahmad","Matt Henry","Abishek Porel","Devdutt Padikkal","Shashank Singh"]
  },
  "T8 Abhishek & Jitesh & Girish": {
    color:"#dc2626", C:"Travis Head", VC:"Vaibhav Sooryavanshi", owner:"Abhishek & Jitesh & Girish",
    players:["Vaibhav Sooryavanshi","Tilak Varma","Arshdeep Singh","Rashid Khan","Jos Buttler","Shimron Hetmyer","Travis Head","Jitesh Sharma","Trent Boult","Mitchell Santner","Nehal Wadhera"]
  },
};

// ══════════════════════════════════════════════════════════════════════════════
// GOOGLE SHEETS DATA FETCHER
// ══════════════════════════════════════════════════════════════════════════════
let SHEET_DATA = null;

async function fetchSheetData() {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${SHEET_GID}`;
  
  try {
    console.log('🔄 Fetching from Google Sheets...');
    console.log('📍 URL:', url);
    
    const response = await fetch(url, {
      method: 'GET',
      mode: 'cors',
      credentials: 'omit'
    });
    
    if (!response.ok) {
      throw new Error(`HTTP ${response.status}: ${response.statusText}`);
    }
    
    const csvText = await response.text();
    console.log('✅ Fetched', csvText.length, 'characters');
    
    return parseSheetData(csvText);
  } catch (error) {
    console.error('❌ Error fetching sheet:', error);
    console.error('💡 Make sure your sheet is publicly accessible (Anyone with the link can view)');
    throw error;
  }
}

function parseCSVLine(line) {
  const result = [];
  let current = '';
  let inQuotes = false;
  
  for (let i = 0; i < line.length; i++) {
    const char = line[i];
    if (char === '"') {
      inQuotes = !inQuotes;
    } else if (char === ',' && !inQuotes) {
      result.push(current.trim());
      current = '';
    } else {
      current += char;
    }
  }
  result.push(current.trim());
  return result;
}

function parseNum(val) {
  if (!val || val === '' || val === 'null' || val.toLowerCase() === 'null') return null;
  const num = parseFloat(val);
  return isNaN(num) ? null : num;
}

function parseSheetData(csvText) {
  const lines = csvText.split('\n').filter(l => l.trim());
  const headers = parseCSVLine(lines[0]);
  
  console.log('📊 Sheet Headers:', headers);
  
  const cols = {
    playerName: 0, squadName: 1, playerType: 2, matchNo: 3, matchName: 4, startingXI: 5,
    runs: 6, inningsNo: 7, fours: 8, sixs: 9, strikeRate: 10, bonus25: 11, negative: 12,
    catchTaken: 13, catchBonus: 14, runoutStumping: 15, dotBalls: 16, wickets: 17,
    lbwBowled: 18, maidenOver: 19, economy: 20, bonusPoints: 21, totalPoints: 22
  };
  
  const playerData = {};
  const matchSet = new Set();
  
  for (let i = 1; i < lines.length; i++) {
    const values = parseCSVLine(lines[i]);
    const playerName = values[cols.playerName];
    const matchNo = values[cols.matchNo];
    const matchName = values[cols.matchName];
    
    if (!playerName || !matchNo || playerName.toLowerCase() === 'total') continue;
    
    matchSet.add(JSON.stringify({ no: matchNo, name: matchName }));
    
    if (!playerData[playerName]) {
      playerData[playerName] = { matches: {} };
    }
    
    playerData[playerName].matches[matchNo] = {
      matchName: matchName || '',
      totalPoints: parseNum(values[cols.totalPoints]),
      breakdown: {
        startingXI: values[cols.startingXI] || '',
        runs: parseNum(values[cols.runs]),
        inningsNo: values[cols.inningsNo] || '',
        fours: parseNum(values[cols.fours]),
        sixs: parseNum(values[cols.sixs]),
        strikeRate: parseNum(values[cols.strikeRate]),
        bonus25_50_75_100: parseNum(values[cols.bonus25]),
        negative: parseNum(values[cols.negative]),
        catchTaken: parseNum(values[cols.catchTaken]),
        catchBonus: parseNum(values[cols.catchBonus]),
        runoutStumping: parseNum(values[cols.runoutStumping]),
        dotBalls: parseNum(values[cols.dotBalls]),
        wickets: parseNum(values[cols.wickets]),
        lbwBowled: parseNum(values[cols.lbwBowled]),
        maidenOver: parseNum(values[cols.maidenOver]),
        economy: parseNum(values[cols.economy]),
        bonusPoints: parseNum(values[cols.bonusPoints])
      }
    };
  }
  
  const matches = Array.from(matchSet)
    .map(m => JSON.parse(m))
    .sort((a, b) => {
      const aNum = parseInt(a.no) || 0;
      const bNum = parseInt(b.no) || 0;
      return aNum - bNum;
    });
  
  console.log(`✅ Loaded ${Object.keys(playerData).length} players, ${matches.length} matches`);
  
  return {
    lastUpdated: new Date().toLocaleString('en-IN', { 
      day: '2-digit', 
      month: 'short', 
      hour: '2-digit', 
      minute: '2-digit' 
    }),
    matches: matches,
    players: playerData
  };
}

// ── POINTS HELPERS ────────────────────────────────────────────────────────────
function getPlayerMatchData(player, matchNo) {
  if (!DATA.players[player]) return null;
  return DATA.players[player].matches[matchNo] || null;
}

function getBasePoints(player, matchNo) {
  const data = getPlayerMatchData(player, matchNo);
  return data ? data.totalPoints : null;
}

function applyMultiplier(basePoints, player, sqName){
  if(basePoints === null) return null;
  const sq = SQUADS[sqName];
  if(player === sq.C) return Math.round(basePoints * 2);
  if(player === sq.VC) return Math.round(basePoints * 1.5);
  return basePoints;
}

function sqMatchTotal(sqName, matchNo){
  const match = DATA.matches.find(m => m.no === matchNo);
  if (!match) return 0;
  
  return SQUADS[sqName].players.reduce((sum, p) => {
    const base = getBasePoints(p, matchNo);
    const final = applyMultiplier(base, p, sqName);
    return sum + (final ?? 0);
  }, 0);
}

function sqTotal(sqName){
  return DATA.matches.reduce((sum, match) => {
    return sum + sqMatchTotal(sqName, match.no);
  }, 0);
}

function sqAverage(sqName){
  const matchesWithPoints = DATA.matches.filter(m => sqMatchTotal(sqName, m.no) > 0).length;
  return matchesWithPoints > 0 ? Math.round(sqTotal(sqName) / matchesWithPoints) : 0;
}

function sqBestMatch(sqName){
  let best = 0;
  DATA.matches.forEach(m => {
    const pts = sqMatchTotal(sqName, m.no);
    if(pts > best) best = pts;
  });
  return best;
}

function ranked(){
  return Object.keys(SQUADS).map(sq => ({sq, total: sqTotal(sq)})).sort((a,b) => b.total - a.total);
}

function setupScrollIndicator(tableId, indicatorId){
  const table = document.getElementById(tableId);
  const indicator = document.getElementById(indicatorId);
  
  if(!table || !indicator) return;
  
  const checkScroll = () => {
    if(table.scrollWidth > table.clientWidth && table.scrollLeft < 50){
      indicator.classList.remove('hidden');
    } else {
      indicator.classList.add('hidden');
    }
  };
  
  checkScroll();
  table.addEventListener('scroll', checkScroll);
  window.addEventListener('resize', checkScroll);
}

  const breakdown = matchData.breakdown;
  const sq = SQUADS[sqName];
  const isC = player === sq.C;
  const isVC = player === sq.VC;
  const basePoints = matchData.totalPoints;
  const finalPoints = applyMultiplier(basePoints, player, sqName);

  document.getElementById("modalTitle").textContent = player;
  document.getElementById("modalSub").textContent = (match.name || 'Match ' + matchNo);
  document.getElementById("modalStats").innerHTML = '';

  const breakdownRows = [];
  
  if(breakdown.startingXI && breakdown.startingXI.toLowerCase() !== 'no') {
    breakdownRows.push({label: "Starting XI", val: 4});
  }
  
  if(breakdown.runs !== null && breakdown.runs !== 0) breakdownRows.push({label: "Runs", val: breakdown.runs});
  if(breakdown.fours !== null && breakdown.fours !== 0) breakdownRows.push({label: "Fours", val: breakdown.fours});
  if(breakdown.sixs !== null && breakdown.sixs !== 0) breakdownRows.push({label: "Sixes", val: breakdown.sixs});
  if(breakdown.strikeRate !== null && breakdown.strikeRate !== 0) breakdownRows.push({label: "Strike Rate Bonus", val: breakdown.strikeRate});
  if(breakdown.bonus25_50_75_100 !== null && breakdown.bonus25_50_75_100 !== 0) breakdownRows.push({label: "Milestone Bonus (25/50/75/100)", val: breakdown.bonus25_50_75_100});
  
  if(breakdown.wickets !== null && breakdown.wickets !== 0) breakdownRows.push({label: "Wickets", val: breakdown.wickets});
  if(breakdown.lbwBowled !== null && breakdown.lbwBowled !== 0) breakdownRows.push({label: "LBW/Bowled Bonus", val: breakdown.lbwBowled});
  if(breakdown.dotBalls !== null && breakdown.dotBalls !== 0) breakdownRows.push({label: "Dot Balls", val: breakdown.dotBalls});
  if(breakdown.maidenOver !== null && breakdown.maidenOver !== 0) breakdownRows.push({label: "Maiden Overs", val: breakdown.maidenOver});
  if(breakdown.economy !== null && breakdown.economy !== 0) breakdownRows.push({label: "Economy Bonus", val: breakdown.economy});
  
  if(breakdown.catchTaken !== null && breakdown.catchTaken !== 0) breakdownRows.push({label: "Catches", val: breakdown.catchTaken});
  if(breakdown.catchBonus !== null && breakdown.catchBonus !== 0) breakdownRows.push({label: "Catch Bonus", val: breakdown.catchBonus});
  if(breakdown.runoutStumping !== null && breakdown.runoutStumping !== 0) breakdownRows.push({label: "Runout/Stumping", val: breakdown.runoutStumping});
  
  if(breakdown.negative !== null && breakdown.negative !== 0) breakdownRows.push({label: "Negative Points", val: breakdown.negative});
  if(breakdown.bonusPoints !== null && breakdown.bonusPoints !== 0) breakdownRows.push({label: "Bonus Points", val: breakdown.bonusPoints});

  document.getElementById("modalBreakdown").innerHTML = 
    (breakdownRows.length > 0 ? breakdownRows.map(row => `
      <div class="pts-row">
        <span class="pts-row-label">${row.label}</span>
        <span class="pts-row-val ${row.val>0?'pos':row.val<0?'neg':'neu'}">${row.val>0?'+':''}${row.val}</span>
      </div>`).join("") : '<div class="pts-row"><span class="pts-row-label">No points scored</span><span class="pts-row-val neu">0</span></div>') +
    `<div class="pts-row total">
      <span class="pts-row-label">Base Total Points</span>
      <span class="pts-row-val neu">${basePoints}</span>
    </div>` +
    (isC || isVC ? `<div class="pts-row total" style="background:#eff6ff">
      <span class="pts-row-label" style="color:var(--accent);font-weight:700">Final Points (${isC?'Captain ×2':'Vice-Captain ×1.5'})</span>
      <span class="pts-row-val pos" style="color:var(--accent)">${finalPoints}</span>
    </div>` : '');

  document.getElementById("modalOverlay").style.display = "flex";
  document.body.style.overflow = "hidden";
}

function closeModal(e){
  if(e.target === document.getElementById("modalOverlay")) closeModalBtn();
}

function closeModalBtn(){
  document.getElementById("modalOverlay").style.display = "none";
  document.body.style.overflow = "";
}

// ══════════════════════════════════════════════════════════════════════════════
// INITIALIZE
// ══════════════════════════════════════════════════════════════════════════════
loadData();
</script>
</body>
</html>
